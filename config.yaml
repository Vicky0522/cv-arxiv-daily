# TODO: add papers by configuration file
base_url: "https://arxiv.paperswithcode.com/api/v0/papers/"
user_name: "Vicky0522"
repo_name: "cv-arxiv-daily"
show_authors: True
show_links: True
show_badge: True
max_results: 10

publish_readme: True
publish_gitpage: True
publish_wechat: False

# file paths
json_readme_path: './docs/cv-arxiv-daily.json'
json_gitpage_path: './docs/cv-arxiv-daily-web.json'
json_wechat_path: './docs/cv-arxiv-daily-wechat.json'

md_readme_path: 'README.md'
md_gitpage_path: './docs/index.md'
md_wechat_path: './docs/wechat.md'

# keywords to search
keywords:
    "world model":
        filters: ["world model", "video world model",
                  "video generation model", "generative world model",
                  "latent world model"]
    "embodied AI":
        filters: ["embodied AI", "embodied agent",
                  "embodied world model", "VLM robot",
                  "vision language model robot"]
    "image generation":
        filters: ["image generation", "text-to-image",
                  "image synthesis", "diffusion model",
                  "image editing"]
    "LLM training":
        filters: ["LLM training", "LLM fine-tuning",
                  "RLHF", "reinforcement learning from human feedback",
                  "instruction tuning", "continual pretraining",
                  "LLM alignment", "preference optimization"]
